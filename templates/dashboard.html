<!DOCTYPE html>
<html>
<head>
<title>Analytics Dashboard</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}

.logo {
    width: 50px;
    height: 50px;
}

.myimg {
    width: 50px;
    height: 50px;
    border: 2px solid black;
    border-radius: 25px;
}

.chart-container{
    width: 500px;     /* Control width */
    height: 500px;    /* Control height */
    margin: auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">

<div class="logo">
<img class="myimg" src="{{ url_for('static', filename='img.png') }}">
</div>

<a class="navbar-brand ms-2" href="/chatbot">Health Center</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse"
data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav me-auto">

<li class="nav-item">
<a class="nav-link" href="/chatbot">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/about">About</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/contact">Contact</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/developer">Developer</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/blog">Blog</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/history">History</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="/dashboard">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/bmi">BMI Calculator</a>
</li>

</ul>

<a href="/logout" class="btn btn-danger">Logout</a>

</div>
</div>
</nav>

<!-- MAIN -->
<div class="container mt-5">

<h2 class="text-center mb-4">Disease Analytics Dashboard</h2>

{% if diseases and diseases|length > 0 %}

<div class="chart-container mx-auto">
    <canvas id="myChart"></canvas>
</div>

<script>
const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'pie',
    data: {
        labels: {{ diseases|tojson }},
        datasets: [{
            data: {{ counts|tojson }},
            backgroundColor: [
                '#ff6384',
                '#36a2eb',
                '#ffce56',
                '#4bc0c0',
                '#9966ff'
            ]
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false   // 🔥 Important line
    }
});
</script>

{% else %}

<div class="alert alert-info text-center">
No analytics data available yet. Start using the chatbot.
</div>

{% endif %}

</div>

</body>
</html>
