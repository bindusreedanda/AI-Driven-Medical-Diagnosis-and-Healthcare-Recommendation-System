<!DOCTYPE html>
<html>
<head>

<title>Nearby Hospitals</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.hospital-card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Nearby Hospitals</h2>

<div class="text-center mb-4">

<button class="btn btn-primary" onclick="getLocation()">
Find Hospitals Near Me
</button>

</div>

<div id="hospitalList">

{% for hospital in hospitals %}

<div class="hospital-card">

<h5>{{ hospital.name }}</h5>

<a href="https://www.google.com/maps?q={{ hospital.lat }},{{ hospital.lon }}"
class="btn btn-success"
target="_blank">

Open in Google Maps

</a>

</div>

{% endfor %}

</div>

</div>


<script>

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

let lat = position.coords.latitude
let lon = position.coords.longitude

window.location.href = `/nearby_hospitals?lat=${lat}&lon=${lon}`

})

}else{

alert("Geolocation not supported")

}

}

</script>

</body>
</html>
