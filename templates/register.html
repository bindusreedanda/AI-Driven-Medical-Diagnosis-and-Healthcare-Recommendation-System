<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register | Health Care</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg,#ff9966,#ff5e62);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.card{
width:400px;
border-radius:20px;
box-shadow:0px 10px 30px rgba(0,0,0,0.2);
}

.logo{
width:70px;
margin:auto;
display:block;
}
</style>
</head>

<body>

<div class="card p-4">
<img src="{{ url_for('static', filename='img.png') }}" class="logo mb-3">

<h3 class="text-center fw-bold">Create Account</h3>
<p class="text-center text-muted">Register to continue</p>

<form method="post">

<div class="mb-3">
<label class="form-label">Username</label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<div class="d-grid">
<button class="btn btn-success btn-lg">Register</button>
</div>

<p class="text-center mt-3">
Already have account?
<a href="/">Login</a>
</p>

</form>
</div>

</body>
</html>
